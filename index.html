<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo World: Power Climb</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="score-box">🏛️ <span id="score">0</span></div>
      <div id="level-box">LVL <span id="level">1</span></div>
      <div id="lives-box">❤️ <span id="lives">3</span></div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
      <div class="screen-content">
        <div class="pixel-title">DEMO WORLD</div>
        <div class="pixel-subtitle">POWER CLIMB</div>
        <div class="character-preview">
          <div class="doodle-char big"></div>
        </div>
        <p class="tagline">Jump your way to the top!<br><span>No internet? No problem.</span></p>
        <button id="start-btn" class="pixel-btn">▶ START GAME</button>
        <div class="controls-hint">
          <span>← → Arrow Keys / A D</span> &nbsp;|&nbsp; <span>Mobile: Tilt/Tap sides</span>
        </div>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen">
      <div class="screen-content">
        <div class="pixel-title red">GAME OVER</div>
        <div class="emoji-row" id="result-emoji">😵</div>
        <p class="result-text">Score: <strong id="final-score">0</strong></p>
        <p class="result-text">Best: <strong id="best-score">0</strong></p>
        <button id="restart-btn" class="pixel-btn">↺ PLAY AGAIN</button>
      </div>
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="screen">
      <div class="screen-content">
        <div class="pixel-title gold">YOU WIN!</div>
        <div class="emoji-row">🏆🎉🗳️</div>
        <p class="result-text">Score: <strong id="win-score">0</strong></p>
        <button id="winrestart-btn" class="pixel-btn gold-btn">▶ PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
